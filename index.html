<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摩配选品工具</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f7; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        header { background: #ee4d2d; color: white; padding: 20px; border-radius: 8px; }
        .desc-box { background: rgba(255,255,255,0.2); padding: 10px; margin-top: 10px; border-radius: 4px; font-size: 14px; }
        .filter-section { background: white; padding: 15px; margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap; border-radius: 8px; align-items: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 8px; overflow: hidden; border: 1px solid #eee; position: relative; transition: 0.2s; }
        .p0-tag, .p1-tag { position: absolute; top: 10px; left: 10px; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; z-index: 10; }
        .p0-tag { background: #007bff; } .p1-tag { background: #28a745; }
        .img-container { height: 200px; display: flex; align-items: center; justify-content: center; background: #fafafa; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .info { padding: 10px; }
        .row-action { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .price { color: #ee4d2d; font-size: 18px; font-weight: bold; }
        .btn-link { font-size: 12px; color: #555; text-decoration: underline; cursor: pointer; }
        .invite-id { background: #fee; padding: 6px; border-radius: 4px; cursor: pointer; font-weight: bold; display: block; text-align: center; color: #ee4d2d; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏍️ 摩配热销原品清单</h1>
        <div class="desc-box">【说明：每日更新核心选品数据，请买手优先关注P0等级及最新日期。】</div>
    </header>

    <div class="filter-section">
        <input type="text" id="searchInput" placeholder="搜索标题关键字..." oninput="applyFilters()">
        <select id="pFilter" onchange="applyFilters()"><option value="">Price Judge(全部)</option><option value="P0">P0</option><option value="P1">P1</option></select>
        <input type="date" id="dateFilter" onchange="applyFilters()">
    </div>

    <div class="product-grid" id="productGrid"></div>
</div>

<script src="data.js"></script>
<script>
    const mapData = (arr) => ({
        title: arr[0], variant: arr[1], price: parseFloat(arr[2]), 
        imgUrl: arr[3], link: arr[4], l1: arr[5], l2: arr[6], 
        inviteId: arr[7], modelId: arr[8], judge: arr[9], link1688: arr[10], date: arr[11]
    });

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.src = e.target.dataset.src; observer.unobserve(e.target); } });
    });

    function render(dataList) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        dataList.forEach(arr => {
            const item = mapData(arr);
            const card = document.createElement('div');
            card.className = 'card';
            // 链接有效性校验
            const is1688Valid = item.link1688 && item.link1688.startsWith('http');
            
            card.innerHTML = `
                <div class="${item.judge === 'P0' ? 'p0-tag' : 'p1-tag'}">${item.judge}</div>
                <div class="img-container"><img data-src="${item.imgUrl}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="></div>
                <div class="info">
                    <div style="font-size:12px; height:36px; overflow:hidden;">${item.title}</div>
                    <div class="row-action">
                        <span class="price">¥${item.price}</span>
                        <a href="${item.link}" target="_blank" class="btn-link">原品>>></a>
                        ${is1688Valid ? `<a href="${item.link1688}" target="_blank" class="btn-link">1688>>></a>` : `<span style="font-size:12px; color:#ccc;">暂无核价</span>`}
                    </div>
                    <div class="invite-id" onclick="navigator.clipboard.writeText('${item.inviteId}'); alert('ID已复制: ${item.inviteId}')">${item.inviteId}</div>
                    <div style="font-size:10px; color:#999; margin-top:5px;">更新日期: ${item.date}</div>
                </div>
            `;
            grid.appendChild(card);
            observer.observe(card.querySelector('img'));
        });
    }

    function applyFilters() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const judge = document.getElementById('pFilter').value;
        const date = document.getElementById('dateFilter').value;
        render(products.filter(arr => {
            const item = mapData(arr);
            return item.title.toLowerCase().includes(query) && (!judge || item.judge === judge) && (!date || item.date === date);
        }));
    }

    window.onload = () => render(products);
</script>
</body>
</html>
