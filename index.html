<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摩配选品工具</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .filter-section { background: white; padding: 20px; border-radius: 12px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e1e4e8; transition: 0.3s; position: relative; }
        .card:hover { box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        
        /* P0/P1 标签 */
        .judge-tag { position: absolute; top: 10px; left: 10px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .bg-p0 { background: #d4edda; color: #155724; }
        .bg-p1 { background: #d1ecf1; color: #0c5460; }
        
        .img-container { height: 180px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .info { padding: 15px; }
        .price { color: #ff5722; font-size: 22px; font-weight: 800; }
        .btn-jump { background: #eee; padding: 5px 10px; border-radius: 4px; text-decoration: none; color: #333; font-size: 12px; }
        .btn-jump:hover { background: #ddd; }
        .invite-id { background: #fff1f0; color: #d9363e; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold; cursor: pointer; margin: 10px 0; border: 1px dashed #ffa39e; }
    </style>
</head>
<body>

<div class="container">
    <header style="color:#333;"><h1>🏍️ 摩配选品看板</h1></header>
    
    <div class="filter-section">
        <input type="text" id="searchInput" placeholder="搜索标题..." oninput="applyFilters()">
        <select id="pFilter" onchange="applyFilters()"><option value="">P0/P1(全部)</option><option value="P0">P0</option><option value="P1">P1</option></select>
        <input type="number" id="minPrice" placeholder="最低价" oninput="applyFilters()">
        <input type="number" id="maxPrice" placeholder="最高价" oninput="applyFilters()">
        <select id="sortOrder" onchange="applyFilters()">
            <option value="default">默认</option>
            <option value="priceAsc">价格升序</option>
            <option value="priceDesc">价格降序</option>
            <option value="dateDesc">日期最新</option>
        </select>
        <span id="countDisplay"></span>
    </div>

    <div class="product-grid" id="productGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;"></div>
</div>

<script src="data.js"></script>
<script>
    // 映射：J列是1688link，K列是judge
    const mapData = (arr) => ({
        title: arr[0], variant: arr[1], price: parseFloat(arr[2]), 
        imgUrl: arr[3], link: arr[4], l1: arr[5], l2: arr[6], 
        inviteId: arr[7], modelId: arr[8], link1688: arr[9], judge: arr[10], date: arr[11]
    });

    function render(dataList) {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = '';
        dataList.forEach(arr => {
            const item = mapData(arr);
            const card = document.createElement('div');
            card.className = 'card';
            // 跳转逻辑：检查链接
            const jump1688 = () => {
                if (item.link1688 && item.link1688.startsWith('http')) window.open(item.link1688, '_blank');
                else alert('该产品暂无核价链接');
            };

            card.innerHTML = `
                <div class="judge-tag ${item.judge === 'P0' ? 'bg-p0' : 'bg-p1'}" onclick="(${jump1688})()">1688核价: ${item.judge}</div>
                <div class="img-container"><img data-src="${item.imgUrl}" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></div>
                <div class="info">
                    <div style="font-size:13px; height:40px; overflow:hidden; margin-bottom:10px;">${item.title}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="price">¥${item.price}</span>
                        <a href="${item.link}" target="_blank" class="btn-jump">原品链接>>></a>
                    </div>
                    <div class="invite-id" onclick="navigator.clipboard.writeText('${item.inviteId}'); alert('ID已复制')">${item.inviteId}</div>
                    <div style="font-size:11px; color:#888;">更新日期: ${item.date}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function applyFilters() {
        let filtered = products.filter(arr => {
            const item = mapData(arr);
            const q = document.getElementById('searchInput').value.toLowerCase();
            const p = document.getElementById('pFilter').value;
            const min = parseFloat(document.getElementById('minPrice').value) || 0;
            const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            return item.title.toLowerCase().includes(q) && (!p || item.judge === p) && (item.price >= min && item.price <= max);
        });

        const sort = document.getElementById('sortOrder').value;
        if (sort === 'priceAsc') filtered.sort((a,b) => a[2] - b[2]);
        if (sort === 'priceDesc') filtered.sort((a,b) => b[2] - a[2]);
        if (sort === 'dateDesc') filtered.sort((a,b) => new Date(b[11]) - new Date(a[11]));

        render(filtered);
    }

    window.onload = () => {
        applyFilters();
        // 初始化懒加载
        const obs = new IntersectionObserver(ents => ents.forEach(e => {
            if(e.isIntersecting) { e.target.src = e.target.dataset.src; obs.unobserve(e.target); }
        }));
        document.querySelectorAll('img').forEach(img => obs.observe(img));
    };
</script>
</body>
</html>
