<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摩配热销原品清单 - 高效版</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f7; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .controls { background: white; padding: 15px; position: sticky; top: 0; z-index: 100; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; }
        .full { filter: grayscale(100%); opacity: 0.6; }
        .img-container img { width: 100%; height: 200px; object-fit: contain; }
        .copy-btn { background: #ee4d2d; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <input type="text" id="search" placeholder="搜索产品名称..." oninput="handleSearch()" style="width: 100%; padding: 10px;">
        <p id="status">加载中...</p>
    </div>
    <div class="product-grid" id="productGrid"></div>
</div>

<script src="data.js"></script>
<script>
    let currentIndex = 0;
    const pageSize = 50;
    let filteredData = products;

    function renderBatch() {
        const grid = document.getElementById('productGrid');
        const end = Math.min(currentIndex + pageSize, filteredData.length);
        
        for (let i = currentIndex; i < end; i++) {
            const item = filteredData[i];
            const isFull = (item[9] === "是" || item[9] === true);
            const card = document.createElement('div');
            card.className = `card ${isFull ? 'full' : ''}`;
            card.innerHTML = `
                <div class="img-container"><img src="${item[3]}" loading="lazy"></div>
                <h4>${item[0]}</h4>
                <p>价格: ${item[2]} | 规格: ${item[1]}</p>
                <button class="copy-btn" onclick="navigator.clipboard.writeText('${item[7]}'); alert('ID已复制');">复制邀请ID: ${item[7]}</button>
            `;
            grid.appendChild(card);
        }
        currentIndex = end;
        document.getElementById('status').innerText = `显示 ${currentIndex} / ${filteredData.length} 个产品`;
    }

    function handleSearch() {
        const keyword = document.getElementById('search').value.toLowerCase();
        filteredData = products.filter(p => p[0].toLowerCase().includes(keyword));
        currentIndex = 0;
        document.getElementById('productGrid').innerHTML = '';
        renderBatch();
    }

    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
            if (currentIndex < filteredData.length) renderBatch();
        }
    };

    renderBatch(); // 初始加载
</script>
</body>
</html>
