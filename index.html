<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>商品列表</title>
    <style>
        .filter-controls { margin: 20px 0; padding: 10px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        tr:hover { background-color: #f1f1f1; cursor: pointer; }
    </style>
</head>
<body>

<div class="filter-controls">
    <select id="categoryFilter" onchange="applyFilters()">
        <option value="全部">全部分类</option>
        <option value="摩托车零配件">摩托车零配件</option>
        <option value="其他的">其他的</option>
    </select>
    <input type="number" id="minPrice" placeholder="最低价" oninput="applyFilters()">
    <input type="number" id="maxPrice" placeholder="最高价" oninput="applyFilters()">
    <select id="sortOrder" onchange="applyFilters()">
        <option value="default">默认排序</option>
        <option value="asc">价格从低到高</option>
        <option value="desc">价格从高到低</option>
    </select>
</div>

<table id="productTable">
    <thead>
        <tr>
            <th>标题</th><th>规格</th><th>价格</th><th>类目</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script src="data.js"></script>
<script>
    function renderTable(data) {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        data.forEach(item => {
            const row = body.insertRow();
            row.onclick = () => window.open(item[4], '_blank'); // item[4] 为链接
            row.innerHTML = `<td>${item[0]}</td><td>${item[1]}</td><td>${item[2]}</td><td>${item[5]}</td>`;
        });
    }

    function applyFilters() {
        let filtered = [...products];

        // 类目过滤
        const cat = document.getElementById('categoryFilter').value;
        if (cat !== "全部") filtered = filtered.filter(p => p[5] === cat);

        // 价格区间
        const min = parseFloat(document.getElementById('minPrice').value) || 0;
        const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;
        filtered = filtered.filter(p => parseFloat(p[2]) >= min && parseFloat(p[2]) <= max);

        // 排序
        const sort = document.getElementById('sortOrder').value;
        if (sort === 'asc') filtered.sort((a, b) => parseFloat(a[2]) - parseFloat(b[2]));
        if (sort === 'desc') filtered.sort((a, b) => parseFloat(b[2]) - parseFloat(a[2]));

        renderTable(filtered);
    }

    // 初始化渲染
    renderTable(products);
</script>
</body>
</html>
