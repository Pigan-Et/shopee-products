<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>摩配热销原品清单</title>
    <style>
        body { font-family: 'PingFang SC', sans-serif; background: #f4f4f7; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; } /* 扩宽容器以适应9列 */
        
        header { background: #ee4d2d; color: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(238,77,45,0.2); }
        header h1 { margin: 0 0 15px 0; font-size: 28px; }
        .guide-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; }
        .guide-step { font-size: 14px; line-height: 1.5; display: flex; align-items: flex-start; gap: 8px; }
        .guide-step b { color: #ffeb3b; font-size: 16px; }

        .filter-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; }
        
        /* 强制9列网格布局 */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(9, 1fr); 
            gap: 12px; 
        }
        
        .card { background: white; border-radius: 8px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; position: relative; display: flex; flex-direction: column; font-size: 13px; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        
        .judge-tag { position: absolute; top: 8px; left: 8px; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; z-index: 10; }
        .bg-p0 { background: #ffc107; color: #000; }
        .bg-p1 { background: #e3f2fd; color: #1565c0; border: 1px solid #91d5ff; }
        
        .img-container { width: 100%; height: 140px; background: #fff; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0f0f0; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-weight: bold; height: 36px; line-height: 18px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; cursor: help; }
        
        /* 价格在左，型号在右且限宽200px */
        .model-price-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 5px; }
        .price { color: #c62828; font-size: 16px; font-weight: bold; flex-shrink: 0; }
        .model-name { 
            font-size: 11px; color: #1890ff; background: #e8f4ff; padding: 2px 6px; border-radius: 4px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; 
            max-width: 200px; text-align: right; cursor: help;
        }
        
        .id-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .invite-id-box { border: 1px dashed #ee4d2d; padding: 2px 4px; font-size: 12px; color: #ee4d2d; border-radius: 4px; cursor: pointer; flex: 1; text-align: center; margin-right: 5px; }

        .footer-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .date-text { font-size: 10px; color: #999; }
        .btn-link { color: #666; font-weight: bold; text-decoration: none; font-size: 11px; }

        /* 分页样式 */
        .pagination-container { margin: 30px 0; display: flex; justify-content: center; gap: 5px; }
        .page-btn { padding: 8px 14px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .page-btn:hover { border-color: #ee4d2d; color: #ee4d2d; }
        .page-btn.active { background: #ee4d2d; color: white; border-color: #ee4d2d; }
        .page-btn:disabled { background: #f5f5f5; color: #ccc; cursor: not-allowed; }

        #imageModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏍️ 摩配热销原品清单</h1>
        <div class="guide-container">
            <div class="guide-step"><span>1️⃣</span><div><b>看等级：</b>优先找 <b>P0</b> 爆款！</div></div>
            <div class="guide-step"><span>2️⃣</span><div><b>点左上：</b>P0/P1 可看参考价。</div></div>
            <div class="guide-step"><span>3️⃣</span><div><b>去提报：</b>点击<b>红虚线框</b>复制ID去后台报满型号！</div></div>
        </div>
    </header>

    <div class="filter-section">
        <div class="filter-row">
            <input type="text" id="searchInput" placeholder="标题或邀请ID搜索..." oninput="debouncedFilter()">
            <select id="l1Filter" onchange="updateL2(); applyFilters()"><option value="">一级类目</option></select>
            <select id="pFilter" onchange="applyFilters()"><option value="">优先级</option><option value="P0">P0</option><option value="P1">P1</option></select>
            <select id="sortOrder" onchange="applyFilters()">
                <option value="default">最新排序</option>
                <option value="priceAsc">价格低→高</option>
                <option value="priceDesc">价格高→低</option>
            </select>
            <span id="countDisplay" style="font-weight:bold; color:#ee4d2d; margin-left:auto;"></span>
        </div>
    </div>

    <div class="product-grid" id="productGrid"></div>
    <div class="pagination-container" id="pagination"></div>
</div>

<div id="imageModal" onclick="this.style.display='none'"><img id="modalImg" style="max-width:95%; max-height:95%;"></div>

<script>
    let products = []; 
    let filteredData = []; 
    let currentPage = 1; 
    const pageSize = 36; // 4行 * 9列

    const cleanId = (str) => (str || "").toString().replace(/['"+]/g, '').trim();

    async function loadData() {
        try {
            const res = await fetch('data.csv');
            const text = await res.text();
            products = text.split(/\r?\n/).slice(1).map((line, index) => {
                let r = []; let cur = ''; let q = false;
                for (let c of line) { if (c === '"') q = !q; else if (c === ',' && !q) { r.push(cur.trim()); cur = ''; } else cur += c; }
                r.push(cur.trim()); r.push(index); return r;
            }).filter(a => a.length >= 12);
            initFilters(); 
            applyFilters();
        } catch (e) { console.error("数据加载失败", e); }
    }

    const mapData = (arr) => ({
        title: arr[0], variant: arr[1], price: parseFloat(arr[2]) || 0, imgUrl: arr[3], link: arr[4], 
        l1: arr[5], l2: arr[6], inviteId: cleanId(arr[7]), 
        judge: arr[10], date: arr[11] || "2024-01-01", specialTag: arr[14], modelCount: arr[15] || "1"
    });

    function applyFilters() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const l1 = document.getElementById('l1Filter').value;
        const p = document.getElementById('pFilter').value;

        filteredData = products.filter(arr => {
            const item = mapData(arr);
            return (item.title.toLowerCase().includes(q) || item.inviteId.toLowerCase().includes(q)) && 
                   (!l1 || item.l1 === l1) && (!p || item.judge === p);
        });

        const sort = document.getElementById('sortOrder').value;
        if (sort === 'priceAsc') filteredData.sort((a,b) => a[2] - b[2]);
        else if (sort === 'priceDesc') filteredData.sort((a,b) => b[2] - a[2]);
        
        document.getElementById('countDisplay').innerText = `找到 ${filteredData.length} 件`;
        currentPage = 1;
        render();
    }

    function render() {
        const grid = document.getElementById('productGrid'); 
        grid.innerHTML = '';
        
        const start = (currentPage - 1) * pageSize;
        const pagedItems = filteredData.slice(start, start + pageSize);

        pagedItems.forEach(arr => {
            const item = mapData(arr);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="judge-tag ${item.judge === 'P0' ? 'bg-p0' : 'bg-p1'}">${item.judge}</div>
                <div class="img-container" onclick="showModal('${item.imgUrl}')">
                    <img src="${item.imgUrl}">
                </div>
                <div class="info">
                    <div class="title" title="${item.title}">${item.title}</div>
                    <div class="model-price-row">
                        <div class="price">¥${item.price}</div>
                        <div class="model-name" title="${item.variant}">${item.variant}</div>
                    </div>
                    <div class="id-row">
                        <div class="invite-id-box" onclick="copyText('${item.inviteId}')">ID: ${item.inviteId}</div>
                        <span style="font-size:11px;color:#666">共${item.modelCount}款</span>
                    </div>
                    <div class="footer-row">
                        <span class="date-text">${item.date}</span>
                        <a href="${item.link}" target="_blank" class="btn-link">查看原品 >>></a>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
        updatePagination();
    }

    function updatePagination() {
        const pageCount = Math.ceil(filteredData.length / pageSize);
        const nav = document.getElementById('pagination');
        nav.innerHTML = '';

        if (pageCount <= 1) return;

        // 上一页
        const prev = document.createElement('button');
        prev.className = 'page-btn';
        prev.innerText = ' < ';
        prev.disabled = currentPage === 1;
        prev.onclick = () => { currentPage--; render(); window.scrollTo(0,0); };
        nav.appendChild(prev);

        // 页码按钮逻辑 (显示当前页前后2页)
        for (let i = 1; i <= pageCount; i++) {
            if (i === 1 || i === pageCount || (i >= currentPage - 2 && i <= currentPage + 2)) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; render(); window.scrollTo(0,0); };
                nav.appendChild(btn);
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                const dot = document.createElement('span');
                dot.innerText = '...';
                dot.style.padding = '0 5px';
                nav.appendChild(dot);
            }
        }

        // 下一页
        const next = document.createElement('button');
        next.className = 'page-btn';
        next.innerText = ' > ';
        next.disabled = currentPage === pageCount;
        next.onclick = () => { currentPage++; render(); window.scrollTo(0,0); };
        nav.appendChild(next);
    }

    function initFilters() {
        const l1s = [...new Set(products.map(p => p[5]))].filter(v => v);
        const select = document.getElementById('l1Filter');
        l1s.forEach(v => { select.innerHTML += `<option value="${v}">${v}</option>`; });
    }

    function showModal(url) {
        document.getElementById('modalImg').src = url;
        document.getElementById('imageModal').style.display = 'flex';
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        alert('已复制 ID: ' + text);
    }

    let timer;
    const debouncedFilter = () => { clearTimeout(timer); timer = setTimeout(applyFilters, 300); };

    window.onload = loadData;
</script>
</body>
</html>
